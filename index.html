<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evaluasi Kepatuhan Label Pangan</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0F766E; /* Teal color for trust and health */
            --primary-light: #14B8A6;
            --bg-color: #F8FAFC;
            --card-bg: #FFFFFF;
            --text-main: #1E293B;
            --text-muted: #64748B;
            --border: #E2E8F0;
            --success: #22C55E;
            --danger: #EF4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .mobile-container {
            width: 100%;
            max-width: 480px; /* Mobile optimized width */
            background-color: var(--card-bg);
            min-height: 100vh;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .header {
            padding: 24px 20px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white;
            border-bottom-left-radius: 24px;
            border-bottom-right-radius: 24px;
            box-shadow: 0 4px 15px rgba(15, 118, 110, 0.2);
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .header p {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .content {
            padding: 24px 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* Upload Section */
        .upload-section {
            background: #F1F5F9;
            border: 2px dashed #CBD5E1;
            border-radius: 16px;
            padding: 32px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .upload-section:hover {
            border-color: var(--primary);
            background: #F0FDFA;
        }

        .upload-icon {
            font-size: 3rem;
            margin-bottom: 12px;
            color: var(--primary);
        }

        .upload-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1rem;
            width: 100%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 6px -1px rgba(15, 118, 110, 0.2);
            transition: transform 0.2s;
            margin-top: 16px;
        }

        .upload-btn:active {
            transform: scale(0.98);
        }

        .upload-btn.camera {
            background-color: white;
            color: var(--primary);
            border: 2px solid var(--primary);
        }

        /* Hidden inputs */
        #file-input, #camera-input {
            display: none;
        }

        /* Preview Section */
        #image-preview-container {
            display: none;
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
            position: relative;
            background: white;
        }

        #image-preview {
            width: 100%;
            height: auto;
            display: block;
        }

        #remove-image {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(0,0,0,0.5);
            color: white;
            border: none;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Loading State */
        .loading-state {
            display: none;
            text-align: center;
            padding: 40px 0;
            flex-direction: column;
            align-items: center;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid #E2E8F0;
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Results Section (Hidden initially) */
        .results-section {
            display: none; /* Changed via JS */
            flex-direction: column;
            gap: 20px;
        }

        .score-card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            border: 1px solid var(--border);
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }

        .score-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: conic-gradient(var(--success) 85%, #E2E8F0 0);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            position: relative;
        }

        .score-circle::before {
            content: "";
            position: absolute;
            width: 100px;
            height: 100px;
            background: white;
            border-radius: 50%;
        }

        .score-value {
            position: relative;
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .score-label {
            font-size: 0.9rem;
            color: var(--text-muted);
            font-weight: 600;
        }

        .details-list {
            list-style: none;
            background: white;
            border-radius: 16px;
            padding: 16px;
            border: 1px solid var(--border);
        }

        .details-list li {
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: flex-start;
            gap: 12px;
            font-size: 0.9rem;
        }

        .details-list li:last-child {
            border-bottom: none;
        }

        .icon-check { color: var(--success); font-weight: bold; font-size: 1.2rem; }
        .icon-cross { color: var(--danger); font-weight: bold; font-size: 1.2rem; }

        .btn-download {
            background-color: var(--text-main);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            width: 100%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 10px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }
        
        .action-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
    </style>
</head>
<body>

<div class="mobile-container">
    <div class="header">
        <h1>LabelGuard AI</h1>
        <p>Cek Kepatuhan Label Pangan BPOM</p>
    </div>

    <div class="content">
        <!-- Initial Upload Area -->
        <div id="upload-area" class="action-container">
            <div class="upload-section" onclick="document.getElementById('file-input').click()">
                <div class="upload-icon">📄</div>
                <h3 style="margin-bottom: 8px;">Unggah Foto Label</h3>
                <p style="font-size: 0.85rem; color: var(--text-muted);">Format JPG/PNG. Pastikan teks terbaca jelas.</p>
            </div>
            
            <button class="upload-btn camera" onclick="document.getElementById('camera-input').click()">
                📷 Ambil Foto Langsung
            </button>

            <!-- Inputs (Hidden) -->
            <input type="file" id="file-input" accept="image/*">
            <!-- Capture attribute opens the camera directly on mobile -->
            <input type="file" id="camera-input" accept="image/*" capture="environment">
        </div>

        <!-- Image Preview Area -->
        <div id="image-preview-container">
            <button id="remove-image">✕</button>
            <img id="image-preview" src="" alt="Preview">
            <button class="upload-btn" id="btn-analyze" style="margin: 16px; width: calc(100% - 32px);">
                🔍 Analisis Label Sekarang
            </button>
        </div>

        <!-- Loading State -->
        <div class="loading-state" id="loading-state">
            <div class="spinner"></div>
            <h3>Menganalisis Label...</h3>
            <p style="font-size: 0.85rem; color: var(--text-muted); margin-top: 8px;">AI sedang mencocokkan data dengan regulasi BPOM</p>
        </div>

        <!-- Results Section (Hidden until analysis is complete) -->
        <div class="results-section" id="results-section">
            <div class="score-card">
                <div class="score-circle">
                    <span class="score-value">0</span>
                </div>
                <h2 id="score-title" style="margin-bottom: 4px;">Tingkat Kepatuhan</h2>
                <p id="score-desc" class="score-label">Menganalisis hasil...</p>
            </div>

            <!-- Konsultan Ekstra Insights -->
            <div id="extra-insights" style="display:none; flex-direction: column; gap: 16px;">
                <div style="background: #FEF2F2; border: 1px solid #FCA5A5; border-radius: 12px; padding: 16px;">
                    <h3 style="color: #991B1B; margin-bottom: 8px; font-size: 1rem; display: flex; align-items: center; gap: 6px;">⚠️ Pelanggaran Regulasi</h3>
                    <ul id="violations-list" style="color: #7F1D1D; font-size: 0.85rem; padding-left: 16px; margin: 0;"></ul>
                </div>
                <div style="background: #F0FDFA; border: 1px solid #5EEAD4; border-radius: 12px; padding: 16px;">
                    <h3 style="color: #115E59; margin-bottom: 8px; font-size: 1rem; display: flex; align-items: center; gap: 6px;">💼 Rekomendasi Konsultan</h3>
                    <ul id="recommendations-list" style="color: #134E4A; font-size: 0.85rem; padding-left: 16px; margin: 0;"></ul>
                </div>
            </div>

            <ul class="details-list" id="details-list">
                <!-- Data will be injected here by JS -->
            </ul>

            <button class="btn-download" id="btn-download-pdf">
                📥 Unduh Laporan (PDF)
            </button>
            <button class="upload-btn camera" id="btn-reset" style="margin-top: 0;">
                Cek Label Lainnya
            </button>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
    // Elements
    const fileInput = document.getElementById('file-input');
    const cameraInput = document.getElementById('camera-input');
    const uploadArea = document.getElementById('upload-area');
    const previewContainer = document.getElementById('image-preview-container');
    const imagePreview = document.getElementById('image-preview');
    const removeImageBtn = document.getElementById('remove-image');
    const btnAnalyze = document.getElementById('btn-analyze');
    const loadingState = document.getElementById('loading-state');
    const resultsSection = document.getElementById('results-section');
    const btnReset = document.getElementById('btn-reset');

    let currentBase64Image = null;
    let lastResult = null;

    // Handle File Selection
    const handleFileSelect = (event) => {
        const file = event.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                imagePreview.src = e.target.result;
                currentBase64Image = e.target.result.split(',')[1]; // Get base64 data only
                uploadArea.style.display = 'none';
                previewContainer.style.display = 'block';
            };
            reader.readAsDataURL(file);
        }
    };

    fileInput.addEventListener('change', handleFileSelect);
    cameraInput.addEventListener('change', handleFileSelect);

    removeImageBtn.addEventListener('click', () => {
        uploadArea.style.display = 'flex';
        previewContainer.style.display = 'none';
        imagePreview.src = '';
        currentBase64Image = null;
        fileInput.value = '';
        cameraInput.value = '';
    });

    btnReset.addEventListener('click', () => {
        resultsSection.style.display = 'none';
        uploadArea.style.display = 'flex';
        imagePreview.src = '';
        currentBase64Image = null;
    });

    // Analyze Label with Vercel Serverless Function
    btnAnalyze.addEventListener('click', async () => {
        if (!currentBase64Image) {
            alert('Silakan unggah atau ambil foto label terlebih dahulu.');
            return;
        }

        previewContainer.style.display = 'none';
        loadingState.style.display = 'flex';

        try {
            const response = await fetch(`/api/analyze`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    image: currentBase64Image
                })
            });

            const result = await response.json();
            
            if (!response.ok) {
                throw new Error(result.error || 'Terjadi kesalahan pada server.');
            }

            lastResult = result;
            renderResults(result);

        } catch (error) {
            alert('Terjadi kesalahan: ' + error.message);
            loadingState.style.display = 'none';
            previewContainer.style.display = 'block'; // Show preview back on error
        }
    });

    function renderResults(result) {
        loadingState.style.display = 'none';
        resultsSection.style.display = 'flex';

        // Update Score
        document.querySelector('.score-value').innerText = result.score;
        document.getElementById('score-title').innerText = `Kepatuhan: ${result.level}`;
        document.getElementById('score-desc').innerText = `Skor audit label mencapai ${result.score}/100`;

        // Update Circle Color
        let color = 'var(--danger)';
        if (result.score >= 80) color = 'var(--success)';
        else if (result.score >= 50) color = '#F59E0B'; // yellow/orange
        
        document.querySelector('.score-circle').style.background = `conic-gradient(${color} ${result.score}%, #E2E8F0 0)`;

        // Render Violations & Recommendations
        const extraInsights = document.getElementById('extra-insights');
        const vList = document.getElementById('violations-list');
        const rList = document.getElementById('recommendations-list');
        
        vList.innerHTML = '';
        rList.innerHTML = '';
        
        if (result.violations && result.violations.length > 0) {
            result.violations.forEach(v => {
                const li = document.createElement('li'); li.innerText = v; li.style.marginBottom = '4px';
                vList.appendChild(li);
            });
        } else {
            vList.innerHTML = '<li>Tidak ada pelanggaran mayor terdeteksi.</li>';
        }

        if (result.consultant_recommendations && result.consultant_recommendations.length > 0) {
            result.consultant_recommendations.forEach(r => {
                const li = document.createElement('li'); li.innerText = r; li.style.marginBottom = '4px';
                rList.appendChild(li);
            });
        } else {
            rList.innerHTML = '<li>Lanjutkan dengan proses QA standar.</li>';
        }
        
        extraInsights.style.display = 'flex';

        // Render List
        const listEl = document.getElementById('details-list');
        listEl.innerHTML = '';
        
        if (result.details) {
            result.details.forEach(detail => {
                const icon = detail.status ? '<span class="icon-check">✓</span>' : '<span class="icon-cross">✗</span>';
                const li = document.createElement('li');
                li.innerHTML = `${icon} <div><strong>${detail.item}</strong><br><span style="color:var(--text-muted)">${detail.notes}</span></div>`;
                listEl.appendChild(li);
            });
        }
    }

    // Generate PDF Logic
    document.getElementById('btn-download-pdf').addEventListener('click', () => {
        if (!lastResult) return;
        
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        
        // Header
        doc.setFont("helvetica", "bold");
        doc.setFontSize(18);
        doc.setTextColor(15, 118, 110); // Teal primary color
        doc.text("Laporan Audit Kepatuhan Label Pangan BPOM", 14, 22);
        
        doc.setFontSize(10);
        doc.setFont("helvetica", "normal");
        doc.setTextColor(100, 116, 139); // Text muted
        doc.text("Tanggal Audit: " + new Date().toLocaleDateString('id-ID', { year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' }), 14, 30);
        doc.text("Digenerate oleh: LabelGuard AI", 14, 35);
        
        doc.setLineWidth(0.5);
        doc.setDrawColor(226, 232, 240);
        doc.line(14, 40, 196, 40);
        
        // Score Summary
        doc.setFontSize(14);
        doc.setFont("helvetica", "bold");
        doc.setTextColor(30, 41, 59);
        doc.text(`Tingkat Kepatuhan: ${lastResult.level}`, 14, 50);
        doc.text(`Skor Keseluruhan: ${lastResult.score} / 100`, 14, 58);
        
        doc.line(14, 65, 196, 65);
        
        let yPos = 75;
        
        // Pelanggaran Regulasi
        if(lastResult.violations && lastResult.violations.length > 0) {
            doc.setFontSize(12);
            doc.setTextColor(220, 38, 38);
            doc.setFont("helvetica", "bold");
            doc.text("PELANGGARAN REGULASI:", 14, yPos);
            yPos += 8;
            
            doc.setFont("helvetica", "normal");
            doc.setFontSize(10);
            doc.setTextColor(30, 41, 59);
            
            lastResult.violations.forEach(v => {
                const textLines = doc.splitTextToSize(`- ${v}`, 180);
                doc.text(textLines, 14, yPos);
                yPos += (textLines.length * 5) + 2;
                if(yPos > 270) { doc.addPage(); yPos = 20; }
            });
            yPos += 5;
        }

        // Rekomendasi Konsultan
        if(lastResult.consultant_recommendations && lastResult.consultant_recommendations.length > 0) {
            if(yPos > 250) { doc.addPage(); yPos = 20; }
            doc.setFontSize(12);
            doc.setTextColor(15, 118, 110);
            doc.setFont("helvetica", "bold");
            doc.text("REKOMENDASI KONSULTAN BISNIS:", 14, yPos);
            yPos += 8;
            
            doc.setFont("helvetica", "normal");
            doc.setFontSize(10);
            doc.setTextColor(30, 41, 59);
            
            lastResult.consultant_recommendations.forEach(r => {
                const textLines = doc.splitTextToSize(`- ${r}`, 180);
                doc.text(textLines, 14, yPos);
                yPos += (textLines.length * 5) + 2;
                if(yPos > 270) { doc.addPage(); yPos = 20; }
            });
            yPos += 10;
        }

        // Details
        if(yPos > 260) { doc.addPage(); yPos = 20; }
        doc.setFontSize(12);
        doc.setTextColor(30, 41, 59);
        doc.setFont("helvetica", "bold");
        doc.text("RINCIAN AUDIT ELEMEN LABEL:", 14, yPos);
        yPos += 10;
        
        if (lastResult.details) {
            lastResult.details.forEach((item, index) => {
                if (yPos > 270) {
                    doc.addPage();
                    yPos = 20;
                }
                
                doc.setFont("helvetica", "bold");
                if (item.status) {
                    doc.setTextColor(34, 197, 94); // Success green
                    doc.text(`[LULUS]`, 14, yPos);
                } else {
                    doc.setTextColor(239, 68, 68); // Danger red
                    doc.text(`[GAGAL]`, 14, yPos);
                }
                
                doc.setTextColor(30, 41, 59);
                doc.text(`${index + 1}. ${item.item}`, 35, yPos);
                
                doc.setFont("helvetica", "normal");
                doc.setFontSize(10);
                doc.setTextColor(100, 116, 139);
                
                const splitNotes = doc.splitTextToSize(`Catatan: ${item.notes}`, 160);
                doc.text(splitNotes, 35, yPos + 6);
                
                yPos += 12 + (splitNotes.length * 5);
            });
        }
        
        // Footer
        const pageCount = doc.internal.getNumberOfPages();
        for(let i = 1; i <= pageCount; i++) {
            doc.setPage(i);
            doc.setFontSize(8);
            doc.setTextColor(150);
            doc.text(`Halaman ${i} dari ${pageCount} - Dokumen ini dihasilkan secara otomatis oleh Konsultan AI.`, 14, 290);
        }
        
        // Dynamic Filename
        let prodName = lastResult.product_name || "Label_Pangan";
        prodName = prodName.replace(/[^a-zA-Z0-9]/g, '_'); // sanitize name
        const now = new Date();
        const y = now.getFullYear();
        const m = String(now.getMonth() + 1).padStart(2, '0');
        const d = String(now.getDate()).padStart(2, '0');
        const h = String(now.getHours()).padStart(2, '0');
        const min = String(now.getMinutes()).padStart(2, '0');
        
        const filename = `${prodName}_${y}${m}${d}_${h}${min}.pdf`;
        doc.save(filename);
    });
</script>
</body>
</html>
